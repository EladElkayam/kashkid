<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>משפחה במשימה</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌟</text></svg>">
  <link rel="apple-touch-icon" href="https://emojicdn.elk.sh/🌟">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    * { box-sizing: border-box; font-family: 'Rubik', sans-serif; }
    body { margin: 0; background-color: #FAF8FF; -webkit-tap-highlight-color: transparent; }
    button, input, textarea { font-family: inherit; outline: none; }
    .btn { cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
    .btn:active { transform: scale(0.95); opacity: 0.8; }
    .sc { padding-bottom: 24px; }
    .sl { padding-bottom: 24px; }
    /* הסתרת פס גלילה לאסתטיקה */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    .academy-q { font-size: 42px; font-weight: 900; color: #6C63FF; margin: 20px 0; text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const fireConfetti = () => {
      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        zIndex: 9999
      });
    };

    /* ─── theme constants ─── */
    const C = {
      bg: "#FAF8FF",
      primary: "#6C63FF",
      green: "#10B981",
      amber: "#F59E0B",
      pink: "#EC4899",
      red: "#EF4444",
      text: "#1A1830",
      mid: "#4A4468",
      soft: "#9590B8",
      border: "#E8E0F5",
      sh: "0 2px 16px rgba(108,99,255,.1)",
      ssm: "0 1px 8px rgba(0,0,0,.07)",
    };

    /* ─── helpers ─── */
    const calcAge = (y) => new Date().getFullYear() - y;
    const fmt = (n) => `${Math.abs(n).toFixed(2)} ₪`;
    const uid = () => "_" + Math.random().toString(36).slice(2, 9);
    const relTime = (iso) => {
      const d = Date.now() - new Date(iso).getTime();
      if (d < 3.6e6)  return `לפני ${Math.floor(d / 6e4)} דק'`;
      if (d < 864e5)  return `לפני ${Math.floor(d / 3.6e6)} שע'`;
      if (d < 6048e5) return `לפני ${Math.floor(d / 864e5)} ימים`;
      const dt = new Date(iso);
      return `${dt.getDate()}/${dt.getMonth() + 1}`;
    };

    const ENGLISH_BANK = [
      { h: "כלב", e: "DOG" }, { h: "חתול", e: "CAT" }, { h: "בית", e: "HOUSE" },
      { h: "תפוח", e: "APPLE" }, { h: "שמש", e: "SUN" }, { h: "מים", e: "WATER" },
      { h: "ספר", e: "BOOK" }, { h: "אוטו", e: "CAR" }, { h: "לחם", e: "BREAD" },
      { h: "חלב", e: "MILK" }, { h: "ילד", e: "BOY" }, { h: "ילדה", e: "GIRL" }
    ];

    const TASK_TYPES = {
      routine: { label: "שגרה",    icon: "🔄", color: "#6366F1", bg: "#EEF2FF" },
      chore:   { label: "מטלה",   icon: "🏠", color: "#F97316", bg: "#FFF7ED" },
      bonus:   { label: "בונוס",  icon: "⭐", color: "#F59E0B", bg: "#FFFBEB" },
      shared:  { label: "משותפת", icon: "🤝", color: "#10B981", bg: "#ECFDF5" },
    };

    const REWARD = {
      money:  { label: "כסף בלבד",     icon: "💰" },
      points: { label: "נקודות",        icon: "⭐" },
      both:   { label: "כסף + נקודות",  icon: "💎" },
      none:   { label: "ללא תגמול",     icon: "🤝" },
    };

    const FREQ = {
      daily:    "יומי",
      weekdays: "ימי חול",
      weekly:   "שבועי",
      specific: "ימים מסוימים",
      ondemand: "לפי צורך",
      onetime:  "חד פעמי",
    };

    /* ─── seed data ─── */
    const INIT_DATA = {
      children: [
        { id: "c1", name: "אליה", username: "elia", birthYear: 2017, birthDate: "15/03/2017", pin: "2017", gender: "boy", avatar: "🧒", photo: "", color: "#6366F1", colorLight: "#EEF2FF", colorGrad: "linear-gradient(135deg,#6366F1,#8B5CF6)", balance: 0, totalEarned: 0, totalSpent: 0, points: 0, savingGoal: { name: "קורקינט חדש", targetAmount: 299 }, academyDifficulty: 2 },
        { id: "c2", name: "ליאן", username: "lian", birthYear: 2016, birthDate: "22/07/2016", pin: "2016", gender: "girl", avatar: "👧", photo: "", color: "#EC4899", colorLight: "#FDF2F8", colorGrad: "linear-gradient(135deg,#EC4899,#F472B6)", balance: 0, totalEarned: 0, totalSpent: 0, points: 0, savingGoal: { name: "אוזניות אלחוטיות", targetAmount: 200 }, academyDifficulty: 2 },
      ],
      sharedMission: "לסדר את הבית ביחד",
      tasks: [], completions: [], transactions: [],
    };

    /* ══════════════════════════════════════════════
       SHARED COMPONENTS
    ══════════════════════════════════════════════ */

    function ProgressBar({ pct, color = C.primary, h = 10 }) {
      return (
        <div style={{ background: "#EEE", borderRadius: 99, height: h, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${Math.min(100, pct)}%`, background: color, borderRadius: 99, transition: "width .6s ease" }} />
        </div>
      );
    }

    function Badge({ children, color = C.primary }) {
      return (
        <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: 99, background: color + "22", color, fontSize: 11, fontWeight: 700 }}>
          {children}
        </span>
      );
    }

    function Divider() { return <div style={{ height: 1, background: C.border, margin: "12px 0" }} />; }

    function BackBtn({ onBack, label = "חזרה" }) {
      return (
        <button onClick={onBack} className="btn" style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: C.primary, fontWeight: 700, fontSize: 15, padding: "8px 0", marginBottom: 6 }}>
          <span style={{ fontSize: 18 }}>←</span> {label}
        </button>
      );
    }

    function EmptyState({ icon, text }) {
      return (
        <div style={{ textAlign: "center", padding: "48px 20px", color: C.soft }}>
          <div style={{ fontSize: 52, marginBottom: 14 }}>{icon}</div>
          <p style={{ fontSize: 15, lineHeight: 1.6 }}>{text}</p>
        </div>
      );
    }

    function Toast({ data: t }) {
      if (!t) return null;
      const bg = t.type === "error" ? C.red : t.type === "warn" ? C.amber : C.green;
      return (
        <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", background: bg, color: "white", padding: "12px 24px", borderRadius: 16, fontWeight: 700, fontSize: 14, zIndex: 9999, boxShadow: "0 8px 24px rgba(0,0,0,.25)", animation: "popIn .3s ease", whiteSpace: "nowrap" }}>
          {t.msg}
        </div>
      );
    }
	
    function ChildAvatar({ child, size = 60, radius = 20 }) {
      if (child.photo && child.photo.trim() !== "") {
        const px = child.photoX !== undefined ? child.photoX : 50;
        const py = child.photoY !== undefined ? child.photoY : 50;
        const scale = child.photoScale || 1;
        
        return (
          <div style={{ width: size, height: size, borderRadius: radius, overflow: "hidden", flexShrink: 0, boxShadow: `0 4px 12px ${child.color}40`, background: child.colorLight, position: "relative" }}>
            <img 
              src={child.photo} 
              alt={child.name} 
              style={{ 
                width: "100%", 
                height: "100%", 
                objectFit: "cover",
                objectPosition: `${px}% ${py}%`,
                transform: `scale(${scale})`,
                display: "block"
              }} 
              onError={(e) => { e.target.style.display = 'none'; }} 
            />
          </div>
        );
      }
      return (
        <div style={{ width: size, height: size, borderRadius: radius, background: child.colorGrad, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.48, flexShrink: 0, boxShadow: `0 4px 12px ${child.color}40` }}>
          {child.avatar}
        </div>
      );
    }

    function PinEntry({ onSubmit, error, resetKey }) {
      const [pin, setPin] = useState("");
      useEffect(() => { setPin(""); }, [resetKey]);

      function tap(k) {
        if (k === "del") { setPin((p) => p.slice(0, -1)); return; }
        if (pin.length >= 4) return;
        const next = pin + k;
        setPin(next);
        if (next.length === 4) setTimeout(() => onSubmit(next), 120);
      }

      return (
        <div>
          <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 20 }}>
            {[0, 1, 2, 3].map((i) => (
              <div key={i} style={{ width: 52, height: 52, borderRadius: 14, background: i < pin.length ? C.primary : "white", border: `2px solid ${i < pin.length ? C.primary : C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, color: "white", transition: "all .15s" }}>
                {i < pin.length ? "●" : ""}
              </div>
            ))}
          </div>
          {error && <p style={{ color: C.red, textAlign: "center", fontSize: 13, marginBottom: 12, fontWeight: 600 }}>{error}</p>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10 }}>
            {["1","2","3","4","5","6","7","8","9","","0","del"].map((k, i) =>
              k === "" ? <div key={i} /> : (
                <button key={i} className="btn" onClick={() => tap(k)} style={{ height: 58, borderRadius: 14, border: "none", background: k === "del" ? "#F0EDFF" : "white", color: C.text, fontSize: k === "del" ? 18 : 22, fontWeight: 700, boxShadow: C.ssm }}>
                  {k === "del" ? "⌫" : k}
                </button>
              )
            )}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       AUTH SCREENS
    ══════════════════════════════════════════════ */

    function SplashScreen({ onParent, onChild }) {
      return (
        <div className="sc" style={{ minHeight: "100vh", background: "linear-gradient(150deg,#6C63FF 0%,#C084FC 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 28, direction: "rtl" }}>
          <div style={{ textAlign: "center", marginBottom: 52 }}>
            <div style={{ fontSize: 80, marginBottom: 16 }}>🌟</div>
            <h1 style={{ color: "white", fontSize: 36, fontWeight: 900, marginBottom: 8 }}>משפחה במשימה</h1>
            <p style={{ color: "rgba(255,255,255,.85)", fontSize: 17 }}>משימות • חיסכון • תגמולים</p>
          </div>
          <div style={{ width: "100%", maxWidth: 340, display: "flex", flexDirection: "column", gap: 14 }}>
            <button onClick={onParent} className="btn" style={{ padding: "18px 24px", borderRadius: 22, border: "none", background: "white", color: C.primary, fontSize: 18, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", gap: 10, boxShadow: "0 10px 30px rgba(0,0,0,.18)" }}>
              <span>👨‍👩‍👧</span> כניסת הורה
            </button>
            <button onClick={onChild} className="btn" style={{ padding: "18px 24px", borderRadius: 22, border: "2px solid rgba(255,255,255,.5)", background: "rgba(255,255,255,.15)", color: "white", fontSize: 18, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
              <span>⭐</span> כניסת ילד
            </button>
          </div>
        </div>
      );
    }

    function ParentLoginScreen({ onSuccess, onBack }) {
      const [pw, setPw] = useState("");
      const [err, setErr] = useState("");
      
      function go() {
        if (pw === "1234") {
          onSuccess({ name: "אלעד", role: "admin" });
        } else if (pw === "5555") {
          onSuccess({ name: "זיוית", role: "parent" });
        } else {
          setErr("סיסמה שגויה, נסה שוב");
        }
      }

      return (
        <div className="sc" style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, direction: "rtl" }}>
          <div style={{ width: "100%", maxWidth: 360 }}>
            <BackBtn onBack={onBack} />
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ fontSize: 60, marginBottom: 12 }}>🔐</div>
              <h2 style={{ fontSize: 26, fontWeight: 800, color: C.text }}>כניסת הורה</h2>
              <p style={{ color: C.soft, marginTop: 6 }}>הזן את הסיסמה שלך</p>
            </div>
            <div style={{ background: "white", borderRadius: 22, padding: 24, boxShadow: C.sh }}>
              <input
                type="password"
                placeholder="סיסמה"
                value={pw}
                onChange={(e) => { setPw(e.target.value); setErr(""); }}
                onKeyDown={(e) => e.key === "Enter" && go()}
                style={{ width: "100%", padding: "14px 16px", borderRadius: 12, border: `2px solid ${err ? C.red : C.border}`, fontSize: 20, textAlign: "center", letterSpacing: 6, color: C.text, marginBottom: 8 }}
              />
              {err && <p style={{ color: C.red, fontSize: 13, marginBottom: 8, textAlign: "center", fontWeight: 600 }}>{err}</p>}
              <button onClick={go} className="btn" style={{ width: "100%", padding: 15, borderRadius: 14, border: "none", background: C.primary, color: "white", fontSize: 17, fontWeight: 700 }}>כניסה</button>
              <p style={{ color: C.soft, fontSize: 11, marginTop: 15, textAlign: "center" }}>אלעד: 1234 | זיוית: 5555</p>
            </div>
          </div>
        </div>
      );
    }

    function ChildSelectScreen({ children, onSelect, onBack }) {
      return (
        <div className="sc" style={{ minHeight: "100vh", background: "linear-gradient(150deg,#FF9A9E,#FECFEF)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, direction: "rtl" }}>
          <div style={{ width: "100%", maxWidth: 360 }}>
            <BackBtn onBack={onBack} />
            <div style={{ textAlign: "center", marginBottom: 36 }}>
              <div style={{ fontSize: 60, marginBottom: 12 }}>👋</div>
              <h2 style={{ color: "white", fontSize: 30, fontWeight: 900 }}>מי אתה?</h2>
              <p style={{ color: "rgba(255,255,255,.85)", marginTop: 8, fontSize: 16 }}>בחר את הפרופיל שלך</p>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {children.map((ch) => (
                <button key={ch.id} onClick={() => onSelect(ch)} className="btn" style={{ display: "flex", alignItems: "center", gap: 16, padding: "18px 20px", borderRadius: 22, border: "none", background: "white", boxShadow: "0 8px 28px rgba(0,0,0,.14)", textAlign: "right" }}>
                  <ChildAvatar child={ch} size={58} radius={18} />
                  <div style={{ flex: 1 }}>
                    <p style={{ fontWeight: 800, fontSize: 19, color: C.text, margin: 0 }}>{ch.name}</p>
                    <p style={{ color: C.soft, fontSize: 13, marginTop: 2, margin: 0 }}>גיל {calcAge(ch.birthYear)}</p>
                  </div>
                  <span style={{ color: ch.color, fontSize: 22 }}>←</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function ChildPinScreen({ child, onSuccess, onBack }) {
      const [err, setErr] = useState("");
      const [rk, setRk] = useState(0);
      
      function handlePin(p) {
        if (p === child.pin) onSuccess();
        else { setErr("קוד שגוי, נסה שוב"); setRk((k) => k + 1); }
      }

      return (
        <div className="sc" style={{ minHeight: "100vh", background: child.colorGrad, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, direction: "rtl" }}>
          <div style={{ width: "100%", maxWidth: 360 }}>
            <BackBtn onBack={onBack} />
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
                <ChildAvatar child={child} size={80} radius={24} />
              </div>
              <h2 style={{ color: "white", fontSize: 28, fontWeight: 900 }}>{child.name}</h2>
              <p style={{ color: "rgba(255,255,255,.85)", marginTop: 8, fontSize: 16 }}>הזן קוד כניסה</p>
            </div>
            <div style={{ background: "white", borderRadius: 24, padding: 24, boxShadow: "0 12px 40px rgba(0,0,0,.18)" }}>
              <PinEntry onSubmit={handlePin} error={err} resetKey={rk} />
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       BOTTOM NAV
    ══════════════════════════════════════════════ */

    function BottomNav({ active, onChange, pendingBadge, isAdmin }) {
      const tabs = [
        { id: "children",  icon: "👨‍👩‍👧", label: "ילדים" },
        { id: "tasks",     icon: "✅",    label: "משימות" },
        { id: "approvals", icon: "🔔",   label: "אישורים", badge: pendingBadge },
        { id: "savings",   icon: "💰",   label: "חיסכון" },
      ];
      
      if (isAdmin) {
        tabs.push({ id: "settings", icon: "⚙️", label: "הגדרות" });
      }
      
      return (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "white", borderTop: `1px solid ${C.border}`, display: "flex", paddingBottom: 8, paddingTop: 6, boxShadow: "0 -4px 20px rgba(0,0,0,.07)", zIndex: 100 }}>
          {tabs.map((t) => (
            <button key={t.id} onClick={() => onChange(t.id)} className="btn" style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, border: "none", background: "none", padding: "4px 0", color: active === t.id ? C.primary : C.soft, position: "relative" }}>
              <span style={{ fontSize: 22, lineHeight: 1 }}>{t.icon}</span>
              <span style={{ fontSize: 10, fontWeight: active === t.id ? 800 : 500 }}>{t.label}</span>
              {t.badge > 0 && (
                <span style={{ position: "absolute", top: 0, right: "18%", background: C.red, color: "white", fontSize: 9, fontWeight: 700, borderRadius: 99, padding: "2px 5px", minWidth: 16, textAlign: "center" }}>
                  {t.badge}
                </span>
              )}
              {active === t.id && (
                <div style={{ position: "absolute", bottom: -6, left: "25%", right: "25%", height: 3, background: C.primary, borderRadius: "3px 3px 0 0" }} />
              )}
            </button>
          ))}
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       PARENT — CHILDREN TAB
    ══════════════════════════════════════════════ */

    function ChildrenTab({ data, setData, onChildClick, onAddChild, isAdmin }) {
      return (
        <div className="sc">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, marginTop: 10 }}>
            <h2 style={{ fontSize: 22, fontWeight: 800, color: C.text, margin: 0 }}>הילדים שלנו</h2>
            {isAdmin && <button onClick={onAddChild} className="btn" style={{ background: C.primary, color: "white", border: "none", borderRadius: 12, padding: "8px 16px", fontWeight: 700, fontSize: 14 }}>+ הוסף</button>}
          </div>
          {data.children.map((ch) => {
            const pct = Math.min(100, (ch.balance / ch.savingGoal.targetAmount) * 100);
            const pend = data.completions.filter((c) => c.childId === ch.id && c.status === "pending").length;
            return (
              <div key={ch.id} onClick={() => onChildClick(ch.id)} className="cp btn" style={{ width: "100%", display: "block", textAlign: "right", background: "white", borderRadius: 24, padding: 20, boxShadow: C.sh, marginBottom: 16, border: `2px solid ${ch.colorLight}`, position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 4, background: ch.colorGrad }} />
                <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
                  <ChildAvatar child={ch} size={60} radius={20} />
                  <div style={{ flex: 1 }}>
                    <p style={{ fontWeight: 800, fontSize: 19, color: C.text, margin: 0 }}>{ch.name}</p>
                    <p style={{ color: C.soft, fontSize: 13, marginTop: 2, margin: "2px 0 0 0" }}>גיל {calcAge(ch.birthYear)}{pend > 0 ? ` · ${pend} ממתינות` : ""}</p>
                  </div>
                  <div style={{ width: 36, height: 36, borderRadius: 12, background: ch.colorLight, display: "flex", alignItems: "center", justifyContent: "center", color: ch.color, fontSize: 18 }}>←</div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 14 }}>
                  {[["💰 יתרה", fmt(ch.balance), ch.color], ["⬆️ הכנסות", fmt(ch.totalEarned), C.green], ["⬇️ הוצאות", fmt(ch.totalSpent), C.red]].map(([l, v, col]) => (
                    <div key={l} style={{ background: ch.colorLight, borderRadius: 14, padding: "10px 8px", textAlign: "center" }}>
                      <p style={{ fontSize: 10, color: C.soft, marginBottom: 4, marginTop: 0 }}>{l}</p>
                      <p style={{ fontWeight: 800, fontSize: 13, color: col, margin: 0 }}>{v}</p>
                    </div>
                  ))}
                </div>
                <div style={{ background: ch.colorLight, borderRadius: 14, padding: "12px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontSize: 12, color: C.mid, fontWeight: 600 }}>🎯 {ch.savingGoal.name}</span>
                    <span style={{ fontSize: 12, fontWeight: 800, color: ch.color }}>{pct.toFixed(0)}%</span>
                  </div>
                  <ProgressBar pct={pct} color={ch.color} h={8} />
                  <p style={{ fontSize: 11, color: C.soft, marginTop: 6, marginBottom: 0 }}>חסכת {fmt(ch.balance)} מתוך {fmt(ch.savingGoal.targetAmount)}</p>
                </div>
              </div>
            );
          })}
        </div>
      );
    }
	
    /* ── child detail screen ── */
    function ChildDetailScreen({ child, data, onBack, onApprove, onReject }) {
      const [tab, setTab] = useState("tasks");
      const completions = data.completions.filter((c) => c.childId === child.id);
      const transactions = data.transactions.filter((t) => t.childId === child.id);
      const pending = completions.filter((c) => c.status === "pending");
      const recent  = completions.filter((c) => c.status !== "pending").slice(0, 5);
      const myTasks = data.tasks.filter((t) => t.assignedTo.includes(child.id) && t.active);
      const pct  = Math.min(100, (child.balance / child.savingGoal.targetAmount) * 100);
      const left = Math.max(0, child.savingGoal.targetAmount - child.balance);

      return (
        <div className="sl">
          <BackBtn onBack={onBack} label="חזרה לילדים" />
          {/* header */}
          <div style={{ borderRadius: 24, background: child.colorGrad, padding: "24px 20px", marginBottom: 16, color: "white", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -20, left: -20, width: 120, height: 120, borderRadius: "50%", background: "rgba(255,255,255,.1)" }} />
            <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 16 }}>
              <ChildAvatar child={child} size={68} radius={22} />
              <div>
                <h2 style={{ fontWeight: 900, fontSize: 24, margin: "0 0 4px 0" }}>{child.name}</h2>
                <p style={{ opacity: .85, fontSize: 14, margin: 0 }}>{child.birthDate} · גיל {calcAge(child.birthYear)}</p>
                <p style={{ opacity: .85, fontSize: 14, margin: "4px 0 0 0" }}>⭐ {child.points} נקודות</p>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
              {[["💰","יתרה",fmt(child.balance)],["⬆️","רווח",fmt(child.totalEarned)],["⬇️","הוצ'",fmt(child.totalSpent)]].map(([ic,l,v]) => (
                <div key={l} style={{ background: "rgba(255,255,255,.2)", borderRadius: 14, padding: "10px 8px", textAlign: "center" }}>
                  <p style={{ fontSize: 16, marginBottom: 2, marginTop: 0 }}>{ic}</p>
                  <p style={{ fontSize: 10, opacity: .85, marginBottom: 3, marginTop: 0 }}>{l}</p>
                  <p style={{ fontWeight: 800, fontSize: 14, margin: 0 }}>{v}</p>
                </div>
              ))}
            </div>
          </div>
          {/* saving goal */}
          <div style={{ background: "white", borderRadius: 20, padding: 16, boxShadow: C.ssm, marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontWeight: 700, fontSize: 15, color: C.text }}>🎯 {child.savingGoal.name}</span>
              <span style={{ fontWeight: 800, fontSize: 14, color: child.color }}>{pct.toFixed(0)}%</span>
            </div>
            <ProgressBar pct={pct} color={child.color} h={10} />
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 12, color: C.soft }}>
              <span>חסכת {fmt(child.balance)}</span>
              <span>יעד {fmt(child.savingGoal.targetAmount)}</span>
            </div>
            {left > 0 && <p style={{ fontSize: 12, color: child.color, fontWeight: 600, marginTop: 6, marginBottom: 0 }}>נשאר {fmt(left)} 🚀</p>}
            {left === 0 && <p style={{ fontSize: 13, color: C.green, fontWeight: 700, marginTop: 6, marginBottom: 0 }}>🎉 הגעת ליעד!</p>}
          </div>
          {/* tabs */}
          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            {[["tasks","📋 משימות"],["history","💸 היסטוריה"],["approvals",`🔔 אישורים${pending.length ? ` (${pending.length})` : ""}`]].map(([id, l]) => (
              <button key={id} onClick={() => setTab(id)} className="btn" style={{ flex: 1, padding: "10px 6px", borderRadius: 14, border: "none", background: tab === id ? child.color : "white", color: tab === id ? "white" : C.mid, fontWeight: 700, fontSize: 12, boxShadow: C.ssm }}>
                {l}
              </button>
            ))}
          </div>
          {/* tasks */}
          {tab === "tasks" && (
            <div>
              {myTasks.length === 0 ? <EmptyState icon="📋" text="אין משימות פעילות" /> : myTasks.map((t) => {
                const tt = TASK_TYPES[t.type] || TASK_TYPES.routine;
                return (
                  <div key={t.id} style={{ background: "white", borderRadius: 16, padding: "14px 16px", marginBottom: 10, boxShadow: C.ssm, display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ width: 40, height: 40, borderRadius: 12, background: tt.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>{t.icon}</div>
                    <div style={{ flex: 1 }}>
                      <p style={{ fontWeight: 700, fontSize: 15, color: C.text, margin: 0 }}>{t.name}</p>
                      <div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}>
                        <Badge color={tt.color}>{tt.label}</Badge>
                        <Badge color={C.amber}>{FREQ[t.frequency]}</Badge>
                      </div>
                    </div>
                    <div style={{ textAlign: "left" }}>
                      {(t.rewardType === "money" || t.rewardType === "both") && <p style={{ fontWeight: 800, fontSize: 14, color: C.green, margin: 0 }}>+{fmt(t.rewardAmount)}</p>}
                      {(t.rewardType === "points" || t.rewardType === "both") && <p style={{ fontWeight: 700, fontSize: 12, color: C.amber, margin: "2px 0 0 0" }}>+{t.rewardPoints}⭐</p>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {/* history */}
          {tab === "history" && (
            <div>
              {transactions.length === 0 ? <EmptyState icon="💸" text="אין תנועות" /> : transactions.slice().reverse().map((tr) => (
                <div key={tr.id} style={{ background: "white", borderRadius: 16, padding: "13px 16px", marginBottom: 10, boxShadow: C.ssm, display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 38, height: 38, borderRadius: 12, background: tr.type === "expense" ? "#FEF2F2" : "#ECFDF5", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>
                    {tr.type === "earning" ? "💰" : tr.type === "bonus" ? "🎁" : "🛒"}
                  </div>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontWeight: 700, fontSize: 14, color: C.text, margin: 0 }}>{tr.desc}</p>
                    <p style={{ fontSize: 12, color: C.soft, marginTop: 2, margin: "2px 0 0 0" }}>{relTime(tr.date)}</p>
                  </div>
                  <p style={{ fontWeight: 800, fontSize: 16, color: tr.type === "expense" ? C.red : C.green, margin: 0 }}>
                    {tr.type === "expense" ? "-" : "+"}{fmt(Math.abs(tr.amount))}
                  </p>
                </div>
              ))}
            </div>
          )}
          {/* approvals */}
          {tab === "approvals" && (
            <div>
              {pending.length > 0 && (
                <>
                  <p style={{ fontWeight: 700, fontSize: 14, color: C.mid, marginBottom: 10 }}>ממתינות לאישור</p>
                  {pending.map((cp) => {
                    const t = data.tasks.find((x) => x.id === cp.taskId);
                    if (!t) return null;
                    return (
                      <div key={cp.id} style={{ background: "white", borderRadius: 16, padding: "14px 16px", marginBottom: 10, boxShadow: C.ssm }}>
                        <div style={{ display: "flex", gap: 12, marginBottom: 10 }}>
                          <span style={{ fontSize: 22 }}>{t.icon}</span>
                          <div style={{ flex: 1 }}>
                            <p style={{ fontWeight: 700, color: C.text, margin: 0 }}>{t.name}</p>
                            <p style={{ fontSize: 12, color: C.soft, margin: "2px 0 0 0" }}>{relTime(cp.completedAt)}</p>
                          </div>
                          {(t.rewardType === "money" || t.rewardType === "both") && <span style={{ fontWeight: 800, color: C.green }}>+{fmt(t.rewardAmount)}</span>}
                        </div>
                        <div style={{ display: "flex", gap: 8 }}>
                          <button onClick={() => onApprove(cp.id)} className="btn" style={{ flex: 1, padding: "10px", borderRadius: 12, border: "none", background: C.green, color: "white", fontWeight: 700, fontSize: 13 }}>✅ אשר</button>
                          <button onClick={() => onReject(cp.id)} className="btn" style={{ flex: 1, padding: "10px", borderRadius: 12, border: "none", background: "#FEF2F2", color: C.red, fontWeight: 700, fontSize: 13 }}>❌ דחה</button>
                        </div>
                      </div>
                    );
                  })}
                  <Divider />
                </>
              )}
              {recent.length === 0 ? <EmptyState icon="🔔" text="אין אישורים קודמים" /> : recent.map((cp) => {
                const t = data.tasks.find((x) => x.id === cp.taskId);
                if (!t) return null;
                return (
                  <div key={cp.id} style={{ background: "white", borderRadius: 16, padding: "13px 16px", marginBottom: 10, boxShadow: C.ssm, display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 22 }}>{t.icon}</span>
                    <div style={{ flex: 1 }}>
                      <p style={{ fontWeight: 700, fontSize: 14, color: C.text, margin: 0 }}>{t.name}</p>
                      <p style={{ fontSize: 12, color: C.soft, margin: "2px 0 0 0" }}>{relTime(cp.completedAt)}</p>
                      {cp.parentNote && <p style={{ fontSize: 12, color: C.primary, marginTop: 2, margin: "2px 0 0 0" }}>"{cp.parentNote}"</p>}
                    </div>
                    <Badge color={cp.status === "approved" ? C.green : C.red}>{cp.status === "approved" ? "אושר" : "נדחה"}</Badge>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════
       PARENT — TASKS TAB
    ══════════════════════════════════════════════ */

    function TasksTab({ data, onAdd, onEdit, onToggle, onDuplicate }) {
      const [filter, setFilter] = useState("all");
      const list = data.tasks.filter((t) => filter === "all" || t.type === filter);
      
      return (
        <div className="sc">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h2 style={{ fontSize: 22, fontWeight: 800, color: C.text, margin: 0 }}>משימות</h2>
            <button onClick={onAdd} className="btn" style={{ background: C.primary, color: "white", border: "none", borderRadius: 12, padding: "8px 16px", fontWeight: 700, fontSize: 14 }}>+ חדשה</button>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>
            {[["all","כולן"],["routine","שגרה"],["chore","מטלות"],["bonus","בונוסים"],["shared","משותפות"]].map(([id, l]) => (
              <button key={id} onClick={() => setFilter(id)} className="btn" style={{ padding: "8px 14px", borderRadius: 12, border: "none", background: filter === id ? C.primary : "white", color: filter === id ? "white" : C.mid, fontWeight: 700, fontSize: 13, whiteSpace: "nowrap", boxShadow: C.ssm, flexShrink: 0 }}>
                {l}
              </button>
            ))}
          </div>
          {list.length === 0 ? <EmptyState icon="✅" text="אין משימות" /> : list.map((t) => {
            const tt = TASK_TYPES[t.type] || TASK_TYPES.routine;
            return (
              <div key={t.id} style={{ background: "white", borderRadius: 18, padding: "14px 16px", marginBottom: 10, boxShadow: C.ssm, border: `1px solid ${t.active ? C.border : "#FEE2E2"}` }}>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <div style={{ width: 44, height: 44, borderRadius: 13, background: tt.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>{t.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                      <div>
                        <p style={{ fontWeight: 700, fontSize: 16, color: t.active ? C.text : C.soft, margin: 0 }}>{t.name}</p>
                        <p style={{ fontSize: 11, color: C.soft, margin: "2px 0 0 0" }}>מאת: {t.createdBy || "אבא"}</p>
                      </div>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => onEdit(t)} className="btn" style={{ padding: "4px 8px", borderRadius: 9, border: `1px solid ${C.border}`, background: "white", fontSize: 12, fontWeight: 600, color: C.mid }}>עריכה</button>
                        <button onClick={() => onDuplicate(t)} className="btn" style={{ padding: "4px 8px", borderRadius: 9, border: `1px solid ${C.border}`, background: "white", fontSize: 12, fontWeight: 600, color: C.primary }}>שכפל</button>
                        <button onClick={() => onToggle(t.id)} className="btn" style={{ padding: "4px 8px", borderRadius: 9, border: "none", background: t.active ? "#FEF2F2" : "#ECFDF5", fontSize: 12, fontWeight: 600, color: t.active ? C.red : C.green }}>
                          {t.active ? "כבה" : "הפעל"}
                        </button>
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      <Badge color={tt.color}>{tt.icon} {tt.label}</Badge>
                      <Badge color={C.soft}>{FREQ[t.frequency]}</Badge>
                      {t.requiresApproval && <Badge color={C.amber}>דורש אישור</Badge>}
                    </div>
                    <div style={{ marginTop: 8, display: "flex", gap: 10, alignItems: "center" }}>
                      {(t.rewardType === "money" || t.rewardType === "both") && <span style={{ fontWeight: 800, fontSize: 14, color: C.green }}>💰 {fmt(t.rewardAmount)}</span>}
                      {(t.rewardType === "points" || t.rewardType === "both") && <span style={{ fontWeight: 700, fontSize: 13, color: C.amber }}>⭐ {t.rewardPoints} נק'</span>}
                      {t.rewardType === "none" && <span style={{ fontSize: 13, color: C.soft }}>🤝 ללא תגמול</span>}
                      <span style={{ fontSize: 11, color: C.soft, marginRight: "auto" }}>
                        {data.children.filter((c) => t.assignedTo.includes(c.id)).map((c) => c.name).join(", ")}
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    /* ── task form ── */
    function TaskFormScreen({ task: init, children, onSave, onDelete, onBack }) {
      const blank = {
        name: "", desc: "", type: "routine", icon: "📝",
        rewardType: "money", rewardAmount: 0, rewardPoints: 0,
        requiresApproval: false, frequency: "daily",
        assignedTo: children.map((c) => c.id), active: true, createdBy: "",
        remindTime: ""
      };
      const [form, setForm] = useState(init || blank);

      function set(k, v) { setForm((f) => ({ ...f, [k]: v })); }
      
      function toggleChild(id) {
        set("assignedTo", form.assignedTo.includes(id) ? form.assignedTo.filter((x) => x !== id) : [...form.assignedTo, id]);
      }
      
      function save() {
        if (!form.name.trim()) return;
        onSave({ ...form, id: init?.id || uid() });
      }

      const ICONS = ["📝","🦷","📚","🛏","🚿","🎒","🍽","🍳","🗑","⭐","🏃","🎵","🐕","🌱","🎮","🧹","🚗","🎨"];

      return (
        <div className="sl">
          <BackBtn onBack={onBack} label="חזרה למשימות" />
          <h2 style={{ fontSize: 22, fontWeight: 800, color: C.text, marginBottom: 20, marginTop: 10 }}>{init ? "עריכת משימה" : "משימה חדשה"}</h2>

          <div style={{ background: "white", borderRadius: 22, padding: 20, boxShadow: C.sh, marginBottom: 16 }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 13, color: C.mid, marginBottom: 6 }}>שם המשימה *</label>
            <input value={form.name} onChange={(e) => set("name", e.target.value)} placeholder="לדוגמה: צחצוח שיניים"
              style={{ width: "100%", padding: "13px 14px", borderRadius: 12, border: `2px solid ${C.border}`, fontSize: 16, color: C.text, marginBottom: 14 }} />
            <label style={{ display: "block", fontWeight: 700, fontSize: 13, color: C.mid, marginBottom: 6 }}>תיאור</label>
            <textarea value={form.desc} onChange={(e) => set("desc", e.target.value)} rows={2} placeholder="הוראות נוספות"
              style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: `2px solid ${C.border}`, fontSize: 14, color: C.text, resize: "none", marginBottom: 14 }} />
              
            <label style={{ display: "block", fontWeight: 700, fontSize: 13, color: C.mid, marginBottom: 6 }}>⏰ שעת תזכורת (אופציונלי)</label>
            <input type="time" value={form.remindTime || ""} onChange={(e) => set("remindTime", e.target.value)}
              style={{ width: "100%", padding: "13px 14px", borderRadius: 12, border: `2px solid ${C.border}`, fontSize: 16, color: C.text, fontFamily: "sans-serif" }} />
          </div>

          <div style={{ background: "white", borderRadius: 22, padding: 20, boxShadow: C.sh, marginBottom: 16 }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 13, color: C.mid, marginBottom: 10 }}>איקון</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
              {ICONS.map((ic) => (
                <button key={ic} onClick={() => set("icon", ic)} className="btn" style={{ width: 44, height: 44, borderRadius: 12, border: `2px solid ${form.icon === ic ? C.primary : C.border}`, background: form.icon === ic ? C.primary + "15" : "white", fontSize: 22 }}>{ic}</button>
              ))}
            </div>
            <label style={{ display: "block", fontWeight: 700, fontSize: 13, color: C.mid, marginBottom: 10 }}>סוג משימה</label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {Object.entries(TASK_TYPES).map(([k, v]) => (
                <button key={k} onClick={() => set("type", k)} className="btn" style={{ padding: "10px 12px", borderRadius: 12, border: `2px solid ${form.type === k ? v.color : C.border}`, background: form.type === k ? v.bg : "white", color: form.type === k ? v.color : C.mid, fontWeight: 700, fontSize: 13 }}>
                  {v.icon} {v.label}
                </button>
              ))}
            </div>
          </div>

          <div style={{ background: "white", borderRadius: 22, padding: 20, boxShadow: C.sh, marginBottom: 16 }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 13, color: C.mid, marginBottom: 10 }}>סוג תגמול</label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
              {Object.entries(REWARD).map(([k, v]) => (
                <button key={k} onClick={() => set("rewardType", k)} className="btn" style={{ padding: "10px 12px", borderRadius: 12, border: `2px solid ${form.rewardType === k ? C.primary : C.border}`, background: form.rewardType === k ? C.primary + "15" : "white", color: form.rewardType === k ? C.primary : C.mid, fontWeight: 700, fontSize: 12 }}>
                  {v.icon} {v.label}
                </button>
              ))}
            </div>
            {(form.rewardType === "money" || form.rewardType === "both") && (
              <>
                <label style={{ display: "block", fontWeight: 700, fontSize: 13, color: C.mid, marginBottom: 6 }}>💰 סכום כסף (₪)</label>
                <input type="number" value={form.rewardAmount} onChange={(e) => set("rewardAmount", parseFloat(e.target.value) || 0)} min={0} step={0.5}
                  style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: `2px solid ${C.border}`, fontSize: 16, color: C.text, marginBottom: 12 }} />
              </>
            )}
            {(form.rewardType === "points" || form.rewardType === "both") && (
              <>
                <label style={{ display: "block", fontWeight: 700, fontSize: 13, color: C.mid, marginBottom: 6 }}>⭐ מספר נקודות</label>
                <input type="number" value={form.rewardPoints} onChange={(e) => set("rewardPoints", parseInt(e.target.value) || 0)} min={0}
                  style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: `2px solid ${C.border}`, fontSize: 16, color: C.text, marginBottom: 12 }} />
              </>
            )}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 0" }}>
              <span style={{ fontWeight: 700, fontSize: 14, color: C.text }}>דורש אישור הורה</span>
              <button onClick={() => set("requiresApproval", !form.requiresApproval)} className="btn" style={{ width: 50, height: 28, borderRadius: 14, border: "none", background: form.requiresApproval ? C.primary : "#DDD", position: "relative", transition: "background .2s" }}>
                <div style={{ width: 22, height: 22, borderRadius: 11, background: "white", position: "absolute", top: 3, right: form.requiresApproval ? 4 : 24, transition: "right .2s", boxShadow: "0 1px 4px rgba(0,0,0,.2)" }} />
              </button>
            </div>
          </div>

          <div style={{ background: "white", borderRadius: 22, padding: 20, boxShadow: C.sh, marginBottom: 16 }}>
            <label style={{ display: "block", fontWeight: 700, fontSize: 13, color: C.mid, marginBottom: 10 }}>תדירות</label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
              {Object.entries(FREQ).map(([k, v]) => (
                <button key={k} onClick={() => set("frequency", k)} className="btn" style={{ padding: "10px 12px", borderRadius: 12, border: `2px solid ${form.frequency === k ? C.primary : C.border}`, background: form.frequency === k ? C.primary + "15" : "white", color: form.frequency === k ? C.primary : C.mid, fontWeight: 700, fontSize: 13 }}>
                  {v}

              ))}
            </div>
            <label style={{ display: "block", fontWeight: 700, fontSize: 13, color: C.mid, marginBottom: 10 }}>שיוך לילדים</label>
            <div style={{ display: "flex", gap: 10 }}>
              {children.map((ch) => (
                <button key={ch.id} onClick={() => toggleChild(ch.id)} className="btn" style={{ flex: 1, padding: "12px 8px", borderRadius: 14, border: `2px solid ${form.assignedTo.includes(ch.id) ? ch.color : C.border}`, background: form.assignedTo.includes(ch.id) ? ch.colorLight : "white", color: form.assignedTo.includes(ch.id) ? ch.color : C.mid, fontWeight: 700 }}>
                  {ch.avatar} {ch.name}
                </button>
              ))}
            </div>
          </div>

    /* ── Date picker dependencies for Child Edit ── */
    function DrumColumn({ items, selected, onSelect, width }) {
      const ITEM_H = 44;
      const VISIBLE = 5;
      const ref = useRef(null);
      const selectedIdx = items.findIndex((it) => it.value === selected);
      
      useEffect(() => { if (ref.current) ref.current.scrollTop = selectedIdx * ITEM_H; }, []);
      function handleScroll() {
        if (!ref.current) return;
        const idx = Math.round(ref.current.scrollTop / ITEM_H);
        const clamped = Math.max(0, Math.min(idx, items.length - 1));
        if (items[clamped].value !== selected) onSelect(items[clamped].value);
      }
      return (
        <div style={{ position: "relative", width, flexShrink: 0 }}>
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: ITEM_H * 2, background: "linear-gradient(to bottom, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%)", zIndex: 2, pointerEvents: "none" }} />
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: ITEM_H * 2, background: "linear-gradient(to top, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%)", zIndex: 2, pointerEvents: "none" }} />
          <div style={{ position: "absolute", top: "50%", left: 6, right: 6, height: ITEM_H, transform: "translateY(-50%)", background: C.primary + "18", borderRadius: 12, zIndex: 1, pointerEvents: "none" }} />
          <div ref={ref} onScroll={handleScroll} style={{ height: ITEM_H * VISIBLE, overflowY: "scroll", scrollSnapType: "y mandatory", scrollbarWidth: "none" }}>
            <style>{`div::-webkit-scrollbar{display:none}`}</style>
            <div style={{ height: ITEM_H * 2 }} />
            {items.map((it) => (
              <div key={it.value} onClick={() => { onSelect(it.value); if (ref.current) { const idx = items.findIndex((x) => x.value === it.value); ref.current.scrollTo({ top: idx * ITEM_H, behavior: "smooth" }); } }}
                style={{ height: ITEM_H, display: "flex", alignItems: "center", justifyContent: "center", scrollSnapAlign: "center", fontSize: it.value === selected ? 17 : 15, fontWeight: it.value === selected ? 800 : 500, color: it.value === selected ? C.primary : C.mid, cursor: "pointer", position: "relative", zIndex: 3 }}>
                {it.label}
              </div>
            ))}
            <div style={{ height: ITEM_H * 2 }} />
          </div>
        </div>
      );
    }

    function DatePicker({ value, onChange }) {
      const MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
      const currentYear = new Date().getFullYear();
      const daysInMonth = new Date(value.year, value.month, 0).getDate();
      const dayItems   = Array.from({ length: daysInMonth }, (_, i) => ({ value: i + 1, label: String(i + 1).padStart(2, "0") }));
      const monthItems = MONTHS.map((m, i) => ({ value: i + 1, label: m }));
      const yearItems  = Array.from({ length: 22 }, (_, i) => ({ value: currentYear - 4 - i, label: String(currentYear - 4 - i) }));
      
      function handleChange(field, val) {
        const next = { ...value, [field]: val };
        const maxDay = new Date(next.year, next.month, 0).getDate();
        if (next.day > maxDay) next.day = maxDay;
        onChange(next);
      }
      return (
        <div style={{ background: "white", borderRadius: 20, overflow: "hidden", boxShadow: C.ssm, border: `2px solid ${C.border}` }}>
          <div style={{ display: "flex", borderBottom: `1px solid ${C.border}`, padding: "10px 0 8px" }}>
            {["יום", "חודש", "שנה"].map((l) => <div key={l} style={{ flex: 1, textAlign: "center", fontSize: 11, fontWeight: 700, color: C.soft }}>{l}</div>)}

    /* ─── Academy 🎓 ─── */
    function Academy({ child, data, onEarn, onBack }) {
      const [game, setGame] = useState(null); 
      const [q, setQ] = useState(null);
      const [ans, setAns] = useState("");
      const [hint, setHint] = useState(null);
      const [isPractice, setIsPractice] = useState(false);
      
      const todayStr = new Date().toDateString();
      const progressKey = `academy_${child.id}_${todayStr}`;
      const [streak, setStreak] = useState(() => parseInt(localStorage.getItem(progressKey)) || 0);

      const alreadyEarnedToday = data.transactions.some(t => 
        t.childId === child.id && 
        t.desc === 'משימת אקדמיה יומית' && 
        new Date(t.date).toDateString() === todayStr
      );

      const TOTAL_QUESTIONS = 20;
      const REWARD_AMOUNT = 5;
      const difficulty = child.academyDifficulty || 2;

      useEffect(() => {
        if (!isPractice) {
          localStorage.setItem(progressKey, streak.toString());
        }
      }, [streak, progressKey, isPractice]);

      const startMath = () => {
        let n1, n2, op, answer;

        if (difficulty === 1) { 
          op = '+';
          n1 = Math.floor(Math.random() * 10) + 1; 
          n2 = Math.floor(Math.random() * 10) + 1; 
          answer = n1 + n2;
        } else if (difficulty === 2) { 
          op = '+';
          n1 = Math.floor(Math.random() * 50) + 10; 
          n2 = Math.floor(Math.random() * 40) + 10; 
          answer = n1 + n2;
        } else { 
          const mode = Math.random();
          if (mode > 0.5) {
            op = 'x';
            n1 = Math.floor(Math.random() * 9) + 2; 
            n2 = Math.floor(Math.random() * 9) + 2; 
            answer = n1 * n2;
          } else {
            op = '+';
            n1 = Math.floor(Math.random() * 50) + 20; 
            n2 = Math.floor(Math.random() * 30) + 10; 
            answer = n1 + n2;
          }
        }

        setQ({ txt: `${n1} ${op === 'x' ? '×' : op} ${n2}`, a: answer, type: 'num' });
        setHint(null);
        setAns("");
        setGame('math');
      };

      const startEng = () => {
        const correct = ENGLISH_BANK[Math.floor(Math.random() * ENGLISH_BANK.length)];
        const wrongOptions = ENGLISH_BANK.filter(item => item.e !== correct.e).sort(() => 0.5 - Math.random()).slice(0, 2);
        const options = [correct.e, wrongOptions[0].e, wrongOptions[1].e].sort(() => 0.5 - Math.random());

        setQ({ txt: `איך אומרים "${correct.h}" באנגלית?`, a: correct.e, options: options, type: 'mcq' });
        setHint(null);
        setAns("");
        setGame('eng');
      };

      const checkAnswer = (providedAns = ans) => {
        if (providedAns.toString().toUpperCase().trim() === q.a.toString()) {
          const newStreak = streak + 1;
          setStreak(newStreak);
          setAns("");
          setHint(null);
          
          if (newStreak === TOTAL_QUESTIONS && !alreadyEarnedToday && !isPractice) {
            onEarn(REWARD_AMOUNT, 'משימת אקדמיה יומית');
            fireConfetti();
            alert(`🎉 אלופים! עניתם על ${TOTAL_QUESTIONS} שאלות והרווחתם ${fmt(REWARD_AMOUNT)} לקופה!`);
            setGame(null);
          } else if (newStreak >= TOTAL_QUESTIONS && !isPractice) {
             alert("מצוין! נמשיך מחר (את הפרס של היום כבר קיבלת 😉)");
             setGame(null);
          } else {
            game === 'math' ? startMath() : startEng();
          }
        } else { 
          if (game === 'math') {
            if (q.txt.includes('+')) {
              const parts = q.txt.split('+').map(p => parseInt(p.trim()));
              const big = Math.max(parts[0], parts[1]);
              const small = Math.min(parts[0], parts[1]);
              setHint(`💡 שיטה לחיבור: שימו בראש את המספר הגדול (${big}) ותוסיפו לו באצבעות עוד ${small}.`);
            } else if (q.txt.includes('×')) {
              const parts = q.txt.split('×').map(p => parseInt(p.trim()));
              setHint(`💡 שיטה לכפל: כפל זה כמו חיבור. זה אומר לחבר את המספר ${parts[1]} לעצמו ${parts[0]} פעמים.`);
            } else {
               setHint(`💡 נסו שוב לאט ובזהירות.`);
            }
          } else if (game === 'eng') {
             setHint(`💡 טעות. רמז: המילה מתחילה באות ${q.a.charAt(0)}`);
          }
          setAns("");
        }
      };

      if (alreadyEarnedToday && !game && !isPractice) {
        return (
          <div className="sl" style={{padding: 20}}>
            <BackBtn onBack={onBack} />
            <div style={{textAlign: 'center', background: 'white', borderRadius: 20, padding: 30, boxShadow: C.sh}}>
              <div style={{fontSize: 50}}>🏆</div>
              <h2 style={{ color: C.primary, margin: "10px 0" }}>משימה הושלמה!</h2>
              <p style={{ color: C.soft, fontSize: 15 }}>סיימתם את משימת האקדמיה להיום והרווחתם {fmt(REWARD_AMOUNT)}.<br/>תחזרו מחר לאתגר חדש!</p>
              <button onClick={() => { setIsPractice(true); setStreak(0); }} className="btn" style={{ background: '#EEF2FF', padding: "10px 20px", borderRadius: 12, border: 'none', color: C.primary, fontWeight: 700, marginTop: 15 }}>תרגול נוסף לכיף (ללא פרס)</button>
            </div>
          </div>
        );
      }

      if (!game) return (
        <div className="sl" style={{padding: 20}}>
          <BackBtn onBack={onBack} />
          <div style={{textAlign: 'center', background: 'white', borderRadius: 20, padding: 30, boxShadow: C.sh}}>
            <h2 style={{ color: C.primary, margin: "0 0 10px 0" }}>🎓 אקדמיה לילדים</h2>
            <p style={{ color: C.soft, fontSize: 14, margin: "0 0 15px 0" }}>
              ענו על <b>{TOTAL_QUESTIONS} שאלות</b> נכון כדי להרוויח <b>{fmt(REWARD_AMOUNT)}</b>!
            </p>
            {isPractice && <Badge color={C.primary}>מצב תרגול כיף (ללא פרס)</Badge>}
            
            <div style={{ background: '#FFFBEB', padding: 12, borderRadius: 12, marginBottom: 20, marginTop: 15, border: `2px solid ${C.amber}55` }}>
              <b style={{color: C.amber, fontSize: 15}}>התקדמות: {streak} מתוך {TOTAL_QUESTIONS}</b>
              <div style={{marginTop: 8}}><ProgressBar pct={(streak / TOTAL_QUESTIONS) * 100} color={C.amber} h={10} /></div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 15 }}>
              <button onClick={startMath} className="btn" style={{ background: '#EEF2FF', padding: 20, borderRadius: 15, border: 'none', color: C.primary, fontWeight: 800, fontSize: 16 }}>🔢<br/><br/>חשבון</button>
              <button onClick={startEng} className="btn" style={{ background: '#FDF2F8', padding: 20, borderRadius: 15, border: 'none', color: C.pink, fontWeight: 800, fontSize: 16 }}>🔤<br/><br/>אנגלית</button>
            </div>
          </div>
        </div>
      );
      
      return (
        <div className="sl" style={{ textAlign: 'center', padding: 20 }}>
          <BackBtn onBack={() => { setGame(null); setHint(null); }} label="ביטול" />
          <div style={{padding: '30px 20px', background: 'white', borderRadius: 24, boxShadow: C.sh}}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 15, color: C.soft, fontWeight: "bold", fontSize: 14 }}>
              <span>שאלה {streak + 1} מתוך {TOTAL_QUESTIONS}</span>
              <span>{isPractice ? '🎮 תרגול חופשי' : `💰 פרס: ${fmt(REWARD_AMOUNT)}`}</span>
            </div>
            <ProgressBar pct={(streak / TOTAL_QUESTIONS) * 100} color={C.green} h={8} />
            <div className="academy-q" style={{marginTop: 30}}>{q.txt}</div>
            
            {hint && (
              <div style={{background: '#FEF2F2', border: `2px solid ${C.red}55`, borderRadius: 12, padding: 12, marginBottom: 20, color: C.red, fontSize: 14, fontWeight: 700}}>
                {hint}
              </div>
            )}

            {q.type === 'mcq' ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 }}>
                {q.options.map((opt, i) => (
                  <button key={i} onClick={() => checkAnswer(opt)} className="btn" style={{ width: '100%', padding: 16, borderRadius: 15, border: `3px solid ${C.border}`, background: "white", fontSize: 20, fontWeight: 800, color: C.text }}>
                    {opt}
                  </button>
                ))}
              </div>
            ) : (
              <>
                <input type="number" value={ans} onChange={e => setAns(e.target.value)} onKeyDown={e => e.key === 'Enter' && checkAnswer()} style={{ width: '100%', fontSize: 32, textAlign: 'center', padding: 15, borderRadius: 15, border: `3px solid ${C.border}`, marginBottom: 20 }} placeholder="תשובה..." autoFocus />
                <button onClick={() => checkAnswer()} className="btn" style={{ width: '100%', background: C.green, color: 'white', padding: 18, borderRadius: 15, fontWeight: 900, fontSize: 18 }}>בדוק תשובה ✅</button>
              </>
            )}
          </div>
        </div>
      );
    }
